<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RFB Radar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #radarResult img {
      max-width: 500px;
    }
  </style>
</head>
<body>

<div id="radarContainer" style="margin-left:60px;">
  <h2 id="title">Car Lifestyle Radar</h2>

  <select id="brandSelect">
    <option value="">Select a brand</option>
    <option>Ford</option>
    <option>Subaru</option>
    <option>Nissan</option>
    <option>Honda</option>
    <option>Chevrolet</option>
    <option>Volkswagen</option>
    <option>Toyota</option>
    <option>Hyundai</option>
    <option>Kia</option>
    <option>Tesla</option>
    <option>BYD</option>
    <option>BMW</option>
    <option>Mercedes</option>
  </select>

  <button id="generateBtn">Generate Radar</button>

  <div id="radarResult"></div>
  <div id="insightsResult"></div>
</div>div>
  
  <script>
   const lifestyleData = {
  "Ford": [4, 3, 4, 2, 2, 3],
  "Subaru": [4, 3, 5, 2, 2, 3],
  "Nissan": [3, 4, 3, 2, 2, 4],
  "Honda": [4, 4, 3, 2, 2, 4],
  "Chevrolet": [4, 3, 4, 2, 3, 3],
  "Volkswagen": [3, 4, 3, 3, 3, 3],
  "Toyota": [5, 4, 3, 2, 2, 4],
  "Hyundai": [3, 4, 3, 4, 3, 3],
  "Kia": [3, 4, 3, 4, 3, 3],
  "Tesla": [2, 4, 2, 5, 3, 2],
  "BYD": [3, 4, 3, 4, 3, 3],
  "BMW": [2, 4, 2, 3, 5, 2],
  "Mercedes": [2, 4, 2, 3, 5, 2]
};


document.getElementById("generateBtn").onclick = async () => {
  const brand = document.getElementById("brandSelect").value;

  if (!brand) {
    alert("Please select a brand");
    return;
  }

  const criteria = ["Family", "Commuter", "Outdoor", "Tech‑Focused", "Luxury", "Budget"];
  const values = lifestyleData[brand];

  const payload = {
    criteria: criteria,
    entities: {
      [brand]: values
    }
  };

  const response = await fetch("https://rfb-radar-app.onrender.com/radar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await response.json();

  document.getElementById("insightsResult").innerHTML =
    `<h3>Insights</h3><ul>${data.insights.map(i => `<li>${i}</li>`).join("")}</ul>`;

  document.getElementById("radarResult").innerHTML =
    `<img src="https://rfb-radar-app.onrender.com/radar-image?${Date.now()}" style="max-width:500px;">`;
};
  window.onload = () => {
  const defaultBrand = "Toyota";
  document.getElementById("brandSelect").value = defaultBrand;
  document.getElementById("generateBtn").click();
};
 // ⭐ Cambiar colores del título e insights a blanco
document.getElementById("title").style.color = "white";

function applyWhiteStyles() {
  const insightsBox = document.getElementById("insightsResult");
  insightsBox.style.color = "white";
  insightsBox.style.marginTop = "10px";
  insightsBox.style.marginBottom = "5px"; // ⭐ Reduce espacio debajo del texto
}

// ⭐ Ajustar alineación del radar hacia la derecha
const radarBox = document.getElementById("radarResult");
radarBox.style.marginLeft = "40px";
radarBox.style.marginBottom = "5px"; // ⭐ Reduce espacio debajo del gráfico

// ⭐ Ajustar alineación del bloque de insights generales (si existe)
const generalInsights = document.getElementById("generalInsights");
if (generalInsights) {
  generalInsights.style.marginLeft = "40px";
  generalInsights.style.color = "white";
}

// ⭐ Generar un radar por defecto al cargar la página
window.onload = () => {
  const defaultBrand = "Toyota";  // Cambia si quieres otra marca
  document.getElementById("brandSelect").value = defaultBrand;
  document.getElementById("generateBtn").click();

  // Aplicar estilos blancos después de generar el radar
  setTimeout(applyWhiteStyles, 500);
};
// ⭐ Reducir espacio inferior del radar y del módulo completo
document.getElementById("radarResult").style.marginBottom = "0px";
document.getElementById("insightsResult").style.marginBottom = "0px";
document.getElementById("radarContainer").style.marginBottom = "0px";

 
  
      </script>

</body>
</html>
